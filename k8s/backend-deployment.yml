apiVersion: apps/v1
kind: Deployment
metadata:
  name: platter-backend-deployment
  labels:
    app: platter-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platter-backend
  template:
    metadata:
      labels:
        app: platter-backend
    spec:
      containers:
        - name: platter-backend
          image: 194133065055.dkr.ecr.us-east-1.amazonaws.com/platter-backend:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          envFrom:
            - secretRef:
                name: platter-secrets
